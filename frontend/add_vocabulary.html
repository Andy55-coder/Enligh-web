<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建立新字卡</title>
    <style>
        :root { --primary: #22c55e; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        
        .nav-bar { background: var(--dark); padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; }
        .nav-bar a { color: white; text-decoration: none; font-weight: bold; padding: 8px 15px; border-radius: 5px; transition: 0.3s; }
        .nav-bar a:hover, .nav-bar a.active { background: var(--primary); }
        
        .main-container { display: flex; justify-content: center; max-width: 1200px; margin: 0 auto; padding-top: 20px; }
        .form-section { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        
        h2 { margin-top: 0; color: var(--dark); display: flex; align-items: center; gap: 10px; font-size: 1.8rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #475569; }
        
        .radio-group { display: flex; gap: 20px; margin-bottom: 10px; }
        .radio-label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-weight: normal; }
        
        input[type="text"], select, textarea { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.2s; }
        input[type="text"]:focus, select:focus, textarea:focus { border-color: var(--primary); }
        
        .word-input-container { display: flex; gap: 10px; }
        .btn-translate { background: #3b82f6; color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn-translate:hover { background: #2563eb; }
        
        .btn-submit { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-submit:hover { background: #16a34a; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="/index">文法特訓</a>
        <a href="/vocabulary">單字字卡</a>
        <a href="/add_vocabulary" class="active">➕ 新增單字卡</a>
    </div>

    <div class="main-container">
        <div class="form-section">
            <h2>➕ 建立新字卡</h2>
            
            <div class="form-group">
                <label>選擇單字集（資料夾）</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="folderMode" id="modeSelect" checked onchange="toggleFolderMode()"> 選擇現有資料夾
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="folderMode" id="modeInput" onchange="toggleFolderMode()"> 建立新資料夾
                    </label>
                </div>
                
                <select id="folderSelect">
                    <option value="總單字卡">📁 總單字卡</option>
                </select>
                
                <input type="text" id="newFolderInput" placeholder="例如: ch01、會計英文" style="display: none;">
            </div>

            <div class="form-group">
                <label for="wordInput">英文單字</label>
                <div class="word-input-container">
                    <input type="text" id="wordInput" placeholder="例如: implement">
                    <button class="btn-translate" onclick="autoTranslate()">自動翻譯</button>
                </div>
            </div>

            <div class="form-group">
                <label for="partSelect">詞性</label>
                <select id="partSelect">
                    <option value="動詞 (v.)">動詞 (v.)</option>
                    <option value="名詞 (n.)">名詞 (n.)</option>
                    <option value="形容詞 (adj.)">形容詞 (adj.)</option>
                    <option value="副詞 (adv.)">副詞 (adv.)</option>
                    <option value="介系詞 (prep.)">介系詞 (prep.)</option>
                    <option value="連字詞 (conj.)">連字詞 (conj.)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="meaningInput">中文翻譯</label>
                <input type="text" id="meaningInput" placeholder="例如: 實施、執行">
            </div>

            <div class="form-group">
                <label for="exampleInput">應用例句 (選填)</label>
                <textarea id="exampleInput" rows="4" placeholder="The company will implement a new policy."></textarea>
            </div>

            <button class="btn-submit" onclick="submitNewCard()">加入我的字卡庫</button>
        </div>
    </div>

    <script>
        const API_URL = "";

        // 控制切換「選擇現有」或「輸入新資料夾」的顯示狀態
        function toggleFolderMode() {
            const isSelect = document.getElementById('modeSelect').checked;
            document.getElementById('folderSelect').style.display = isSelect ? 'block' : 'none';
            document.getElementById('newFolderInput').style.display = isSelect ? 'none' : 'block';
        }

        // 動態獲取該使用者的資料夾清單，並強制把「總單字卡」塞在最上面
        async function loadExistingFolders() {
            const username = localStorage.getItem('toeic_username');
            if (!username) return;

            try {
                const response = await fetch(`${API_URL}/api/get_folders?username=${username}`);
                if (response.ok) {
                    const folders = await response.json();
                    const folderSelect = document.getElementById('folderSelect');
                    if (!folderSelect) return;
                    
                    folderSelect.innerHTML = '';

                    // 🌟 核心要求：在選擇現有資料夾中加入「總單字卡」
                    const totalOpt = document.createElement('option');
                    totalOpt.value = "總單字卡";
                    totalOpt.innerText = "📁 總單字卡";
                    folderSelect.appendChild(totalOpt);

                    // 渲染其他資料夾
                    folders.forEach(folder => {
                        if (folder !== "總單字卡" && folder.trim() !== "") {
                            const opt = document.createElement('option');
                            opt.value = folder;
                            opt.innerText = `📁 ${folder}`;
                            folderSelect.appendChild(opt);
                        }
                    });
                }
            } catch (e) {
                console.error("無法載入新增頁面的資料夾選單:", e);
            }
        }

        // 簡單的前端模擬自動翻譯功能
        function autoTranslate() {
            const word = document.getElementById('wordInput').value.trim().toLowerCase();
            if (!word) {
                alert("請先輸入英文單字！");
                return;
            }
            if (word === "implement") {
                document.getElementById('partSelect').value = "動詞 (v.)";
                document.getElementById('meaningInput').value = "實施、執行";
                document.getElementById('exampleInput').value = "The company will implement a new policy.";
            } else {
                alert("翻譯完畢！(其餘單字請手動輸入中文與例句)");
            }
        }

        // 送出表單資料給後端 API
        async function submitNewCard() {
            const username = localStorage.getItem('toeic_username');
            if (!username) {
                alert("請先登入！");
                window.location.href = "/";
                return;
            }

            const word = document.getElementById('wordInput').value.trim();
            const part = document.getElementById('partSelect').value;
            const meaning = document.getElementById('meaningInput').value.trim();
            const example = document.getElementById('exampleInput').value.trim();
            
            // 判斷要抓取 Select 選單還是 Input 的字串
            const isSelectMode = document.getElementById('modeSelect').checked;
            let folder_name = "總單字卡";

            if (isSelectMode) {
                folder_name = document.getElementById('folderSelect').value;
            } else {
                folder_name = document.getElementById('newFolderInput').value.trim();
            }

            if (!folder_name) {
                alert("請輸入新資料夾名稱！");
                return;
            }

            if (!word || !meaning) {
                alert("請填寫英文單字與中文翻譯！");
                return;
            }

            const payload = { username, word, part, meaning, example, folder_name };

            try {
                const response = await fetch(`${API_URL}/api/add_vocabulary`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert(`成功加入字卡到資料夾 [${folder_name}]！`);
                    // 重新整理頁面上的資料夾清單並清空欄位
                    document.getElementById('wordInput').value = '';
                    document.getElementById('meaningInput').value = '';
                    document.getElementById('exampleInput').value = '';
                    document.getElementById('newFolderInput').value = '';
                    await loadExistingFolders();
                } else {
                    alert("新增失敗，請檢查後端日誌。");
                }
            } catch (error) {
                alert("連端失敗，請確認網路或後端服務是否正常。");
            }
        }

        // 初始化
        window.addEventListener('DOMContentLoaded', loadExistingFolders);
    </script>
</body>
</html>
