<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多益學習系統 - 登入</title>
<style>
        :root { 
            --primary: #10b981; 
            --primary-hover: #059669;
            --dark: #0f172a; 
            --link-color: #3b82f6;
            --link-hover: #2563eb;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
        }

        body { 
            font-family: "Helvetica Neue", Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif; 
            /* 🎯 滿版高質感深色漸層背景，與其他頁面完全同步 */
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #111827 100%);
            background-attachment: fixed;
            background-size: cover;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: #f8fafc;
        }
        
        /* 🎯 登入卡片：改為極具質感的微霧半透明玻璃面板 */
        .login-card { 
            background: rgba(255, 255, 255, 0.96); 
            padding: 45px 40px; 
            border-radius: 16px; 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 420px; 
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        /* 💡 標題顏色改為極深色，確保黑白對比度最高 */
        .login-card h2 { 
            margin-top: 0; 
            color: #0f172a; 
            text-align: center; 
            margin-bottom: 30px; 
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
        
        .form-group { margin-bottom: 24px; }
        
        /* 💡 帳號密碼標籤字體加粗，顯眼且易讀 */
        .form-group label { 
            display: block; 
            font-weight: 700; 
            margin-bottom: 10px; 
            color: #334155; 
            font-size: 0.95rem;
            letter-spacing: 0.5px;
        }
        
        /* 💡 輸入框全面優化：純白背景配深色文字（#1e293b），聚焦時散發流暢綠光 */
        .form-control { 
            width: 100%; 
            padding: 14px 16px; 
            border: 2px solid #cbd5e1; 
            border-radius: 10px; 
            font-size: 1rem; 
            font-weight: 500;
            color: var(--text-main);
            background: #ffffff;
            outline: none; 
            transition: all 0.25s ease; 
        }
        .form-control::placeholder {
            color: #94a3b8;
        }
        .form-control:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
            background: #ffffff;
        }
        
        /* 💡 登入/註冊送出按鈕升級（帶微發光立體感） */
        .btn-submit { 
            background: var(--primary); 
            color: white; 
            border: none; 
            width: 100%; 
            padding: 15px; 
            font-size: 1.15rem; 
            font-weight: 700; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            margin-top: 15px; 
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.25);
            letter-spacing: 1px;
        }
        .btn-submit:hover { 
            background: var(--primary-hover); 
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.35);
        }
        .btn-submit:active {
            transform: translateY(0);
        }
        
        /* 💡 下方切換模式區塊（沒有帳號？立即註冊） */
        .toggle-mode { 
            text-align: center; 
            margin-top: 25px; 
            color: #475569; 
            font-size: 0.95rem; 
            font-weight: 500;
        }
        /* 讓可點擊的藍色連結文字更粗、更醒目 */
        .toggle-mode span { 
            color: var(--link-color); 
            cursor: pointer; 
            font-weight: 700; 
            text-decoration: none;
            margin-left: 4px;
            transition: color 0.2s ease;
        }
        .toggle-mode span:hover { 
            color: var(--link-hover);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2 id="formTitle">帳號登入</h2>
        
        <div class="form-group">
            <label>使用者帳號</label>
            <input type="text" id="username" class="form-control" placeholder="請輸入帳號">
        </div>
        
        <div class="form-group">
            <label>密碼</label>
            <input type="password" id="password" class="form-control" placeholder="請輸入密碼">
        </div>
        
        <button class="btn-submit" id="actionBtn" onclick="handleAuth()">登入系統</button>
        
        <div class="toggle-mode" id="toggleText">
            沒有帳號？ <span onclick="switchMode(true)">立即註冊</span>
        </div>
    </div>

    <script>
        const API_URL = "";
        let isRegisterMode = false;

        function switchMode(toRegister) {
            isRegisterMode = toRegister;
            document.getElementById('formTitle').innerText = toRegister ? "建立新帳號" : "帳號登入";
            document.getElementById('actionBtn').innerText = toRegister ? "註冊新帳號" : "登入系統";
            document.getElementById('toggleText').innerHTML = toRegister ? 
                `已有帳號？ <span onclick="switchMode(false)">返回登入</span>` : 
                `沒有帳號？ <span onclick="switchMode(true)">立即註冊</span>`;
        }

        async function handleAuth() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                return alert("請填寫完整的帳號與密碼！");
            }

            const endpoint = isRegisterMode ? "/api/register" : "/api/login";

            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.success) {
                    alert(result.msg);
                    if (!isRegisterMode) {
                        // 登入成功，將帳號記在 localStorage
                        localStorage.setItem('toeic_username', username);
                        window.location.href = "/index"; // 跳轉至主頁面
                    } else {
                        // 註冊成功，自動切換回登入模式
                        switchMode(false);
                    }
                } else {
                    alert("❌ " + result.msg);
                }
            } catch (error) {
                alert("連線後端 API 失敗，請確認 app.py 是否啟動。");
            }
        }
    </script>
</body>
</html>
