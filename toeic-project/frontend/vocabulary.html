<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的單字字卡</title>
    <style>
        :root { --primary: #22c55e; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        
        .nav-bar { background: var(--dark); padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; }
        .nav-bar a { color: white; text-decoration: none; font-weight: bold; padding: 8px 15px; border-radius: 5px; transition: 0.3s; }
        .nav-bar a:hover, .nav-bar a.active { background: var(--primary); }
        .dashboard { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .user-stats { font-size: 1.2rem; font-weight: bold; color: var(--dark); }

        /* 讓單字卡置中放大 */
        .main-container { display: flex; justify-content: center; max-width: 1200px; margin: 0 auto; }
        .flashcard-section { display: flex; flex-direction: column; align-items: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 700px; }
        
        /* 3D 翻轉卡片 */
        .card-container { perspective: 1000px; width: 100%; height: 400px; cursor: pointer; margin-bottom: 20px; }
        .flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 25px rgba(0,0,0,0.08); border-radius: 16px; }
        .flashcard.flipped { transform: rotateY(180deg); }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; box-sizing: border-box; background: white; border: 2px solid #e2e8f0; text-align: center; }
        
        .card-front { color: var(--dark); }
        .card-front .word-text { font-size: 4rem; font-weight: bold; letter-spacing: 1px; margin-bottom: 15px; }
        .card-front .pron-btn { background: #f1f5f9; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; color: #475569; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; font-size: 1rem; }
        .card-front .pron-btn:hover { background: #e2e8f0; color: var(--dark); }
        
        .card-back { transform: rotateY(180deg); background: #f0fdf4; border-color: #bbf7d0; }
        .card-back .meaning-text { font-size: 2.8rem; font-weight: bold; color: #16a34a; margin-bottom: 20px; }
        .card-back .example-text { font-size: 1.2rem; color: #475569; font-style: italic; background: white; padding: 15px 20px; border-radius: 8px; border-left: 4px solid var(--primary); max-width: 90%; }

        .card-controls { display: flex; align-items: center; gap: 30px; margin-top: 15px; }
        .btn-ctrl { background: var(--dark); color: white; border: none; padding: 12px 25px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-ctrl:hover { background: #1e293b; }
        .btn-ctrl:disabled { background: #cbd5e1; cursor: not-allowed; }
        .progress-text { font-weight: bold; color: #64748b; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html">文法特訓</a>
        <a href="vocabulary.html" class="active">單字字卡</a>
        <a href="add_vocabulary.html">➕ 新增單字卡</a>
    </div>

    <div class="dashboard">
        <div class="user-stats">單字字卡學習模式</div>
        <div class="user-stats" id="totalCountDisplay">字卡總數: 載入中...</div>
    </div>

    <div class="main-container">
        <div class="flashcard-section">
            <div class="card-container" onclick="flipCard()">
                <div class="flashcard" id="flashcard">
                    <div class="card-face card-front">
                        <span id="partDisplay" style="color: #64748b; font-weight: bold; font-size: 1.3rem; margin-bottom: 5px;">n.</span>
                        <div class="word-text" id="frontWord">Loading</div>
                        <button class="pron-btn" onclick="pronounceWord(event)">🔊 Click to Play</button>
                    </div>
                    <div class="card-face card-back">
                        <div class="meaning-text" id="backMeaning">載入中...</div>
                        <div class="example-text" id="backExample">Example sentence will appear here.</div>
                    </div>
                </div>
            </div>
            
            <div class="card-controls">
                <button class="btn-ctrl" id="prevBtn" onclick="changeCard(-1)">上一張</button>
                <span class="progress-text" id="progressDisplay">0 / 0</span>
                <button class="btn-ctrl" id="nextBtn" onclick="changeCard(1)">下一張</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:5000";
        let vocabularyList = [];
        let currentIndex = 0;

        async function loadVocabulary() {
            try {
                const response = await fetch(`${API_URL}/api/vocabulary`);
                if (!response.ok) throw new Error("無法取得單字庫");
                vocabularyList = await response.json();
                
                document.getElementById('totalCountDisplay').innerText = `字卡總數: ${vocabularyList.length} 字`;
                
                if (vocabularyList.length > 0) {
                    currentIndex = 0;
                    renderCard();
                } else {
                    document.getElementById('frontWord').innerText = "字卡庫為空";
                    document.getElementById('backMeaning').innerText = "請先前往新增字卡";
                }
            } catch (error) {
                alert("後端單字庫連線失敗，請確認後端 app.py 是否已啟動。");
            }
        }

        function renderCard() {
            if (vocabularyList.length === 0) return;
            document.getElementById('flashcard').classList.remove('flipped');
            const current = vocabularyList[currentIndex];
            document.getElementById('partDisplay').innerText = current.part || 'n.';
            document.getElementById('frontWord').innerText = current.word;
            document.getElementById('backMeaning').innerText = current.meaning;
            document.getElementById('backExample').innerText = current.example || '無提供例句。';
            document.getElementById('progressDisplay').innerText = `${currentIndex + 1} / ${vocabularyList.length}`;
            document.getElementById('prevBtn').disabled = (currentIndex === 0);
            document.getElementById('nextBtn').disabled = (currentIndex === vocabularyList.length - 1);
        }

        function flipCard() {
            document.getElementById('flashcard').classList.toggle('flipped');
        }

        function pronounceWord(event) {
            event.stopPropagation();
            const word = vocabularyList[currentIndex].word;
            if (!word) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        function changeCard(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= vocabularyList.length) currentIndex = vocabularyList.length - 1;
            renderCard();
        }

        window.onload = loadVocabulary;
    </script>
</body>
</html>
