<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增單字卡</title>
    <style>
        :root { --primary: #22c55e; --dark: #0f172a; --bg: #f8fafc; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        
        .nav-bar { background: var(--dark); padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; }
        .nav-bar a { color: white; text-decoration: none; font-weight: bold; padding: 8px 15px; border-radius: 5px; transition: 0.3s; }
        .nav-bar a:hover, .nav-bar a.active { background: var(--primary); }
        .dashboard { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .user-stats { font-size: 1.2rem; font-weight: bold; color: var(--dark); }

        .main-container { display: flex; justify-content: center; max-width: 1200px; margin: 0 auto; }
        
        .form-section { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .form-section h3 { margin-top: 0; color: var(--dark); border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; font-size: 1.5rem; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #475569; font-size: 1.1rem; }
        .input-row { display: flex; gap: 10px; }
        .form-control { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1.1rem; box-sizing: border-box; outline: none; transition: 0.2s; }
        .form-control:focus { border-color: var(--primary); }
        
        .btn-translate { background: #3b82f6; color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; white-space: nowrap; transition: 0.2s; font-size: 1rem; }
        .btn-translate:hover { background: #2563eb; }
        
        .btn-submit { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn-submit:hover { background: #16a34a; }
        
        .success-msg { display: none; background: #dcfce7; color: #16a34a; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 20px; border: 1px solid #bbf7d0; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <a href="index.html">文法特訓</a>
        <a href="vocabulary.html">單字字卡</a>
        <a href="add_vocabulary.html" class="active">➕ 新增單字卡</a>
    </div>

    <div class="dashboard">
        <div class="user-stats">建置字卡模式</div>
        <div class="user-stats" style="color: #64748b; font-size: 1rem;">打造專屬於你的單字庫</div>
    </div>

    <div class="main-container">
        <div class="form-section">
            <h3>➕ 建立新字卡</h3>
            <div id="successMessage" class="success-msg">🎉 字卡成功儲存至雲端資料庫！</div>
            
            <div class="form-group">
                <label>英文單字</label>
                <div class="input-row">
                    <input type="text" id="inputWord" class="form-control" placeholder="例如: implement">
                    <button class="btn-translate" onclick="autoTranslate()">自動翻譯</button>
                </div>
            </div>
            <div class="form-group">
                <label>詞性</label>
                <select id="inputPart" class="form-control">
                    <option value="v.">動詞 (v.)</option>
                    <option value="n.">名詞 (n.)</option>
                    <option value="adj.">形容詞 (adj.)</option>
                    <option value="adv.">副詞 (adv.)</option>
                    <option value="conj.">連接詞 (conj.)</option>
                    <option value="prep.">介系詞 (prep.)</option>
                </select>
            </div>
            <div class="form-group">
                <label>中文翻譯</label>
                <input type="text" id="inputMeaning" class="form-control" placeholder="例如: 實施、執行">
            </div>
            <div class="form-group">
                <label>應用例句 (選填)</label>
                <textarea id="inputExample" class="form-control" rows="4" placeholder="The company will implement a new policy."></textarea>
            </div>
            <button class="btn-submit" id="submitBtn" onclick="submitNewCard()">加入我的字卡庫</button>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:5000";

        async function autoTranslate() {
            const wordInput = document.getElementById('inputWord').value;
            const word = wordInput.trim ? wordInput.trim() : wordInput;
            if (!word) return alert("請先輸入欲翻譯的英文單字！");

            const translateBtn = document.querySelector('.btn-translate');
            translateBtn.innerText = "翻譯中...";
            translateBtn.disabled = true;

            try {
                const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=en|zh-TW`);
                const data = await res.json();
                if (data.responseData && data.responseData.translatedText) {
                    document.getElementById('inputMeaning').value = data.responseData.translatedText;
                } else {
                    alert("自動翻譯未成功，請手動輸入中文翻譯。");
                }
            } catch (err) {
                alert("翻譯系統連線異常，請手動輸入中文翻譯。");
            } finally {
                translateBtn.innerText = "自動翻譯";
                translateBtn.disabled = false;
            }
        }

        async function submitNewCard() {
            const word = document.getElementById('inputWord').value.trim();
            const part = document.getElementById('inputPart').value;
            const meaning = document.getElementById('inputMeaning').value.trim();
            const example = document.getElementById('inputExample').value.trim();

            if (!word || !meaning) {
                return alert("請填寫完整的英文單字與中文翻譯！");
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "儲存中...";
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_URL}/api/vocabulary`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ word, part, meaning, example })
                });

                if (!response.ok) throw new Error("儲存失敗");

                // 顯示成功提示
                const msg = document.getElementById('successMessage');
                msg.style.display = 'block';
                setTimeout(() => { msg.style.display = 'none'; }, 3000);
                
                // 清空表單
                document.getElementById('inputWord').value = '';
                document.getElementById('inputMeaning').value = '';
                document.getElementById('inputExample').value = '';

            } catch (error) {
                alert("儲存至雲端失敗，請重新檢查後端連線。");
            } finally {
                submitBtn.innerText = "加入我的字卡庫";
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
